version: '3.8'

services:
  repair-fund:
    build: .
    container_name: repair-fund-system
    ports:
      - "3001:3001"
    volumes:
      - repair-data:/app/server/data
    environment:
      - NODE_ENV=production
      - PORT=3001
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  repair-data:
